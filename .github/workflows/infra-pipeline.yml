name: Infrastructure Deployment

on:
  push:
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'apply or destroy'
        required: true
        default: 'apply'

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Checkov IaC Scan (report only - does not block)
        run: |
          docker run --rm -v ${{ github.workspace }}/terraform:/tf bridgecrew/checkov \
            -d /tf --output json > ${{ github.workspace }}/checkov-report.json || true


      
      # Debug reports
      - name: Debug - List all report files
        working-directory: ${{ github.workspace }}
        run: |
          ls -la ${{ github.workspace }}/
          wc -c ${{ github.workspace }}/checkov-report.json || echo "Checkov NOT FOUND"


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      - name: Terraform Apply or Destroy
        run: |
          if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terraform destroy -auto-approve
          else
            terraform apply -auto-approve tfplan
          fi


      - name: Upload Checkov to DefectDojo
        working-directory: ${{ github.workspace }}
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_TOKEN }}" \
            -F "scan_type=Checkov Scan" \
            -F "engagement=1" \
            -F "file=@${{ github.workspace }}/checkov-report.json" || true
