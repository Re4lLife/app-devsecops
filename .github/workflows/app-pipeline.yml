name: 2. Application Pipeline

on:
  push:
    paths:
      - 'app/**'
  workflow_dispatch:

env:
  ECR_REGISTRY: 437797167825.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: vulnerable-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  security-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for cosign keyless signing

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # SAST
      - name: Run SonarQube SAST Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4  # pinned
        continue-on-error: true
        with:
          projectBaseDir: ${{ github.workspace }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # SCA - Snyk
      - name: Run Snyk Dependency Scan
        working-directory: ${{ github.workspace }}/app
        run: |
          npm install
          npm install -g snyk
          snyk test --json > ${{ github.workspace }}/snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Build image
      - name: Build Container Image
        id: build
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      # Container scan - pinned to safe SHA (v0.35.0 - confirmed uncompromised)
      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      # IaC scan
      - name: Run Checkov IaC Scan
        working-directory: ${{ github.workspace }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/terraform:/tf \
            bridgecrew/checkov -d /tf --output json \
            > ${{ github.workspace }}/checkov-report.json || true

      # DAST
      - name: Start MySQL for DAST
        run: |
          docker network create appnet
          docker run -d --network appnet --name mysql \
            -e MYSQL_ROOT_PASSWORD=test \
            -e MYSQL_DATABASE=appdb \
            -e MYSQL_USER=admin \
            -e MYSQL_PASSWORD=test \
            mysql:8.0
          sleep 20

      - name: Start App for DAST
        run: |
          docker run -d --network appnet -p 3000:3000 --name local-app \
            -e DB_HOST=mysql \
            -e DB_USER=admin \
            -e DB_PASSWORD=test \
            -e DB_NAME=appdb \
            -e DB_PORT=3306 \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          sleep 15

      - name: Run OWASP ZAP DAST Scan
        working-directory: ${{ github.workspace }}
        run: |
          chmod 777 ${{ github.workspace }}
          docker run --rm --network appnet \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://local-app:3000 \
            -J zap-report.json -I || true

      # AWS credentials and ECR login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1

      # Push image and capture digest for signing
      - name: Push Image to ECR
        id: push
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          # Capture the immutable digest for signing - never sign a mutable tag
          DIGEST=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            --query 'imageDetails[0].imageDigest' \
            --output text \
            --region us-east-1)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      # Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v2.4.1
        with:
          cosign-release: 'v2.4.1'

      # Sign the image digest with keyless OIDC - no keys to manage
      - name: Sign Container Image
        run: |
          cosign sign --yes \
            $ECR_REGISTRY/$ECR_REPOSITORY@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      # Debug reports
      - name: Debug - List all report files
        working-directory: ${{ github.workspace }}
        run: |
          ls -la ${{ github.workspace }}/
          wc -c ${{ github.workspace }}/snyk-report.json || echo "Snyk NOT FOUND"
          wc -c ${{ github.workspace }}/trivy-image-report.json || echo "Trivy NOT FOUND"
          wc -c ${{ github.workspace }}/zap-report.json || echo "ZAP NOT FOUND"
          wc -c ${{ github.workspace }}/checkov-report.json || echo "Checkov NOT FOUND"

      # Upload to DefectDojo
      - name: Upload Snyk to DefectDojo
        working-directory: ${{ github.workspace }}
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_TOKEN }}" \
            -F "scan_type=Snyk Scan" \
            -F "engagement=1" \
            -F "file=@${{ github.workspace }}/snyk-report.json" || true

      - name: Upload Trivy to DefectDojo
        working-directory: ${{ github.workspace }}
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_TOKEN }}" \
            -F "scan_type=Trivy Scan" \
            -F "engagement=1" \
            -F "file=@${{ github.workspace }}/trivy-image-report.json" || true

      - name: Upload Checkov to DefectDojo
        working-directory: ${{ github.workspace }}
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_TOKEN }}" \
            -F "scan_type=Checkov Scan" \
            -F "engagement=1" \
            -F "file=@${{ github.workspace }}/checkov-report.json" || true

      - name: Upload ZAP to DefectDojo
        working-directory: ${{ github.workspace }}
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_TOKEN }}" \
            -F "scan_type=ZAP Scan" \
            -F "engagement=1" \
            -F "file=@${{ github.workspace }}/zap-report.json" || true